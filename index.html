    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(60,40,20,0.15);
  }
  header h1 { color: #4a2e18; font-family: "Noto Sans JP", sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.2em; text-align: center; line-height: 1.3; }
  header p { font-size: 11px; color: #6b4226; opacity: 0.9; margin-top: 2px; letter-spacing: 0.04em; }

  /* トースト通知 */
  .toast {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--brown-dark);
    color: var(--warm);
    padding: 10px 22px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    z-index: 999;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(60,40,20,0.25);
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* サマリー */
  .summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 12px 12px 8px;
  }
  .summary-card {
    background: var(--card);
    border-radius: 10px;
    padding: 10px 8px;
    text-align: center;
    box-shadow: 0 2px 8px var(--shadow);
    border: 1px solid var(--border);
  }
  .summary-card .label {
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 3px;
    letter-spacing: 0.04em;
  }
  .summary-card .amount { font-size: 14px; font-weight: 700; }
  .summary-card.income .amount { color: var(--green); }
  .summary-card.expense .amount { color: var(--red); }
  .summary-card.balance .amount { color: var(--brown-dark); }

  /* タブ */
  .tab-bar {
    display: flex;
    padding: 8px 12px 0;
    gap: 6px;
  }
  .tab-btn {
    flex: 1;
    padding: 9px 8px;
    border-radius: 10px 10px 0 0;
    border: 1px solid var(--border);
    border-bottom: none;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    background: var(--warm);
    color: var(--muted);
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }
  .tab-btn.active {
    background: var(--card);
    color: var(--brown-dark);
    font-weight: 700;
  }
  .tab-content {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 0 0 12px 12px;
    margin: 0 12px;
  }

  /* 入力フォーム */
  .form-inner { padding: 14px 14px 16px; }

  .type-toggle {
    display: flex;
    background: var(--warm);
    border-radius: 8px;
    padding: 3px;
    margin-bottom: 12px;
  }
  .type-btn {
    flex: 1;
    padding: 8px;
    border: none;
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }
  .type-btn.active-income { background: #7a9e7e; color: #fff; font-weight: 700; }
  .type-btn.active-expense { background: #b87060; color: #fff; font-weight: 700; }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 8px;
  }
  .form-row.full { grid-template-columns: 1fr; }

  .field label {
    display: block;
    font-size: 10px;
    color: var(--muted);
    margin-bottom: 3px;
    font-weight: 500;
    letter-spacing: 0.06em;
  }
  .field input, .field textarea {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    padding: 8px 10px;
    font-family: inherit;
    font-size: 16px;
    color: var(--text);
    background: var(--cream);
    outline: none;
    -webkit-appearance: none;
    transition: border-color 0.2s;
  }
  .field input:focus, .field textarea:focus {
    border-color: var(--sand);
    background: white;
  }
  .field textarea { height: 52px; resize: none; font-size: 16px; }
  .field input[type="date"] { min-height: 40px; line-height: normal; }

  .mipay-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .mipay-row input[type="checkbox"] {
    width: 16px; height: 16px;
    accent-color: var(--brown);
  }
  .mipay-row label { font-size: 12px; color: var(--muted); }

  .submit-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: var(--brown-dark);
    color: var(--warm);
    font-family: "Noto Sans JP", sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: background 0.2s;
  }
  .submit-btn:active { background: var(--brown); }

  /* 一覧 */
  .list-inner { padding: 10px 10px 14px; }

  .balance-bar {
    background: #fdf6ec;
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid #e8d8c0;
    box-shadow: 0 1px 6px rgba(90,60,30,0.08);
  }
  .bal-label { font-size: 10px; color: var(--muted); margin-bottom: 2px; letter-spacing: 0.04em; }
  .bal-amount { font-size: 18px; font-weight: 700; }
  .bal-amount.positive { color: var(--green); }
  .bal-amount.negative { color: var(--red); }

  .filter-row {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
  }
  .filter-row select {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    padding: 7px 8px;
    font-family: inherit;
    font-size: 16px;
    background: var(--cream);
    color: var(--text);
    outline: none;
    -webkit-appearance: none;
  }

  .entry-list { display: flex; flex-direction: column; gap: 5px; }

  .entry-item {
    background: var(--cream);
    border-radius: 8px;
    padding: 8px 10px;
    border: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 6px;
  }
  .entry-item.mipay-item { border-left: 3px solid #c4a265; }

  .entry-left { flex: 1; min-width: 0; }
  .entry-date { font-size: 10px; color: var(--muted); margin-bottom: 1px; }
  .entry-summary {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }
  .entry-note { font-size: 10px; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mipay-badge {
    display: inline-block;
    font-size: 9px;
    background: #fef3df;
    color: #b8862a;
    border-radius: 3px;
    padding: 1px 4px;
    margin-left: 3px;
  }

  .entry-right { text-align: right; flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; }
  .entry-amount { font-size: 14px; font-weight: 700; }
  .entry-amount.income { color: var(--green); }
  .entry-amount.expense { color: var(--red); }
  .entry-balance { font-size: 10px; color: var(--muted); margin-top: 1px; }

  .entry-actions {
    display: flex;
    gap: 4px;
    margin-top: 5px;
  }
  .btn-small {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: var(--warm);
    color: var(--muted);
    cursor: pointer;
    font-family: inherit;
  }
  .btn-delete { border-color: #e8ccc8; color: var(--red); background: var(--red-pale); }

  .empty-msg {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 30px 0;
  }

  .pager {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    padding: 10px 0 0;
    font-size: 12px;
    color: var(--muted);
  }
  .pager button {
    border: 1px solid var(--border);
    background: var(--warm);
    border-radius: 6px;
    padding: 5px 12px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    color: var(--brown-dark);
  }
  .pager button:disabled { opacity: 0.35; }

  /* モーダル */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(50,35,20,0.45);
    z-index: 200;
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--card);
    border-radius: 18px 18px 0 0;
    padding: 18px 14px 36px;
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    border-top: 3px solid var(--sand);
  }
  .modal-title {
    font-family: "Noto Sans JP", sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--brown-dark);
    margin-bottom: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    letter-spacing: 0.06em;
  }
  .modal-close {
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: var(--muted);
    line-height: 1;
  }

  /* 確認ダイアログ */
  .confirm-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(50,35,20,0.5);
    z-index: 300;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .confirm-overlay.open { display: flex; }
  .confirm-box {
    background: var(--card);
    border-radius: 14px;
    padding: 22px 18px;
    width: 100%;
    max-width: 320px;
    border-top: 3px solid var(--sand);
    box-shadow: 0 8px 32px rgba(50,35,20,0.2);
  }
  .confirm-title {
    font-family: "Noto Sans JP", sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--brown-dark);
    margin-bottom: 8px;
    letter-spacing: 0.06em;
  }
  .confirm-msg { font-size: 13px; color: var(--muted); margin-bottom: 18px; line-height: 1.6; }
  .confirm-btns { display: flex; gap: 8px; }
  .confirm-btns button { flex: 1; padding: 11px; border-radius: 8px; border: none; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-cancel { background: var(--warm); color: var(--muted); border: 1px solid var(--border) !important; }
  .btn-confirm { background: var(--red); color: white; }

  /* 飾り */
  .deco { font-size: 10px; color: var(--sand); text-align: center; padding: 6px 0 0; letter-spacing: 0.1em; }
</style>
</head>

  const PAGE_SIZE = 30;
  let currentPage = 1;
  let deleteTargetId = null;
  let editType = 'expense';
  let currentType = 'income';
  let entries = [];
  let nextId = 1;
  let isListeningFirebase = false;

  // ===== Firebase 読み書き =====
  async function saveToFirebase(entriesToSave) {
    try {
      await db.ref('entries').set(entriesToSave);
    } catch(e) {
      console.error('Firebase save error:', e);
      showToast('⚠️ 保存エラー');
    }
  }

  function startFirebaseListener() {
    if (isListeningFirebase) return;
    isListeningFirebase = true;
    db.ref('entries').on('value', (snapshot) => {
      const data = snapshot.val();
      if (data && Array.isArray(data) && data.length > 0) {
        entries = data;
        nextId = Math.max(...entries.map(e => e.id)) + 1;
      } else if (!data) {
        // 初回: ローカルの初期データをFirebaseに保存
        entries = JSON.parse(JSON.stringify(INITIAL_DATA));
        nextId = Math.max(...entries.map(e => e.id)) + 1;
        saveToFirebase(entries);
      }
      updateSummary();
      if (document.getElementById('tab-list').style.display !== 'none') {
        renderList();
      }
      updateMonthFilter();
    });
  }

  function save() {
    saveToFirebase(entries);
  }

  // ===== アプリ初期化 =====
  function initApp() {
    startFirebaseListener();
    updateSummary();
    updateMonthFilter();
  }

  // ===== サマリー更新 =====
  function updateSummary() {
    let inc = 0, exp = 0;
    entries.forEach(e => {
      if (e.type === 'income') inc += e.amount;
      else exp += e.amount;
    });
    const bal = inc - exp;
    document.getElementById('total-income').textContent = '¥' + inc.toLocaleString();
    document.getElementById('total-expense').textContent = '¥' + exp.toLocaleString();
    const balEl = document.getElementById('total-balance');
    balEl.textContent = '¥' + bal.toLocaleString();
    balEl.style.color = bal >= 0 ? 'var(--green)' : 'var(--red)';
  }

  // ===== 月フィルター =====
  function updateMonthFilter() {
    const months = [...new Set(entries.map(e => e.date.slice(0,7)))].sort().reverse();
    const sel = document.getElementById('filter-month');
    const cur = sel.value;
    sel.innerHTML = '<option value="">全期間</option>' + months.map(m => `<option value="${m}">${m}</option>`).join('');
    if (cur && months.includes(cur)) sel.value = cur;
  }

  // ===== 入力タイプ切替 =====
  function setType(t) {
    currentType = t;
    document.getElementById('btn-expense').className = 'type-btn' + (t === 'expense' ? ' active-expense' : '');
    document.getElementById('btn-income').className  = 'type-btn' + (t === 'income'  ? ' active-income'  : '');
  }
  window.setType = setType;

  // ===== 登録 =====
  function addEntry() {
    const date    = document.getElementById('f-date').value;
    const amount  = parseInt(document.getElementById('f-amount').value) || 0;
    const summary = document.getElementById('f-summary').value.trim();
    const mipay   = document.getElementById('f-mipay').checked;
    const note    = document.getElementById('f-note').value.trim();
    if (!date || !amount || !summary) { showToast('⚠️ 日付・金額・摘要は必須です'); return; }
    entries.push({ id: nextId++, date, type: currentType, amount, summary, mipay, note });
    document.getElementById('f-summary').value = '';
    document.getElementById('f-amount').value = '';
    document.getElementById('f-note').value = '';
    document.getElementById('f-mipay').checked = false;
    save();
    showToast('✅ 登録しました');
    showTab('list');
  }
  window.addEntry = addEntry;

  // ===== 一覧 =====
  function renderList() {
    const month = document.getElementById('filter-month').value;
    const type  = document.getElementById('filter-type').value;
    let filtered = entries.filter(e => {
      if (month && !e.date.startsWith(month)) return false;
      if (type === 'mipay') {
        if (!e.mipay) return false;
      } else if (type && e.type !== type) {
        return false;
      }
      return true;
    }).sort((a,b) => b.date.localeCompare(a.date) || b.id - a.id);

    let inc = 0, exp = 0, mipayCount = 0;
    filtered.forEach(e => {
      if (e.type === 'income') inc += e.amount;
      else exp += e.amount;
      if (e.mipay) mipayCount++;
    });
    const bal = inc - exp;
    const balEl = document.getElementById('bar-balance');
    balEl.textContent = '¥' + bal.toLocaleString();
    balEl.className = 'bal-amount ' + (bal >= 0 ? 'positive' : 'negative');
    document.getElementById('mipay-count').textContent = mipayCount + '件';

    const total = filtered.length;
    const pages = Math.max(1, Math.ceil(total / PAGE_SIZE));
    if (currentPage > pages) currentPage = pages;
    const start = (currentPage - 1) * PAGE_SIZE;
    const page  = filtered.slice(start, start + PAGE_SIZE);

    let runBal = 0;
    const allSorted = filtered.slice(0).reverse();
    const balMap = {};
    allSorted.forEach(e => {
      runBal += (e.type === 'income' ? e.amount : -e.amount);
      balMap[e.id] = runBal;
    });

    const list = document.getElementById('entry-list');
    list.innerHTML = page.map(e => `
      <div class="entry-item${e.mipay ? ' mipay-item' : ''}">
        <div class="entry-left">
          <div class="entry-date">${e.date}</div>
          <div class="entry-summary">${e.summary}${e.mipay ? '<span class="mipay-badge">未払</span>' : ''}</div>
          ${e.note ? `<div class="entry-note">${e.note}</div>` : ''}
          <div class="entry-actions">
            <button class="btn-small" onclick="openEdit(${e.id})">編集</button>
            <button class="btn-small btn-delete" onclick="confirmDelete(${e.id}, '${e.summary.replace(/'/g,"\\'")}')">削除</button>
          </div>
        </div>
        <div class="entry-right">
          <div class="entry-amount ${e.type}">${e.type === 'income' ? '+' : '-'}¥${e.amount.toLocaleString()}</div>
          <div class="entry-balance">残¥${(balMap[e.id]||0).toLocaleString()}</div>
        </div>
      </div>`).join('');

    document.getElementById('pager-info').textContent = `${currentPage}/${pages}ページ (${total}件)`;
    document.getElementById('pager-prev').disabled = currentPage <= 1;
    document.getElementById('pager-next').disabled = currentPage >= pages;
  }
  window.renderList = renderList;

  window.prevPage = function() { if (currentPage > 1) { currentPage--; renderList(); } };
  window.nextPage = function() { currentPage++; renderList(); };
  window.applyFilter = function() { currentPage = 1; renderList(); };
  window.goPage = function(page) { currentPage = page; renderList(); };

  // ===== トースト =====
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ===== 削除確認 =====
  window.confirmDelete = function(id, summary) {
    deleteTargetId = id;
    document.getElementById('confirm-msg').textContent = `「${summary}」を削除しますか？`;
    document.getElementById('confirm-overlay').classList.add('open');
  };
  window.closeConfirm = function() { document.getElementById('confirm-overlay').classList.remove('open'); };
  window.execDelete = function() {
    entries = entries.filter(e => e.id !== deleteTargetId);
    closeConfirm();
    save();
    renderList();
    showToast('🗑️ 削除しました');
  };

  // ===== 編集モーダル =====
  function setEditType(t) {
    editType = t;
    document.getElementById('edit-btn-expense').className = 'type-btn' + (t === 'expense' ? ' active-expense' : '');
    document.getElementById('edit-btn-income').className  = 'type-btn' + (t === 'income'  ? ' active-income'  : '');
  }
  window.setEditType = setEditType;

  window.openEdit = function(id) {
    const e = entries.find(x => x.id === id);
    if (!e) return;
    document.getElementById('edit-id').value      = e.id;
    document.getElementById('edit-date').value    = e.date;
    document.getElementById('edit-amount').value  = e.amount;
    document.getElementById('edit-summary').value = e.summary;
    document.getElementById('edit-mipay').checked = e.mipay;
    document.getElementById('edit-note').value    = e.note || '';
    editType = e.type;
    setEditType(e.type);
    document.getElementById('edit-modal').classList.add('open');
  };
  window.closeModal = function() { document.getElementById('edit-modal').classList.remove('open'); };
  window.saveEdit = function() {
    const id  = parseInt(document.getElementById('edit-id').value);
    const idx = entries.findIndex(e => e.id === id);
    if (idx === -1) return;
    entries[idx] = {
      ...entries[idx],
      date:    document.getElementById('edit-date').value,
      amount:  parseInt(document.getElementById('edit-amount').value) || 0,
      summary: document.getElementById('edit-summary').value,
      mipay:   document.getElementById('edit-mipay').checked,
      note:    document.getElementById('edit-note').value,
      type:    editType
    };
    closeModal();
    save();
    renderList();
    showToast('✅ 保存しました');
  };

  // ===== タブ切替 =====
  window.showTab = function(tab) {
    document.getElementById('tab-input').style.display = tab === 'input' ? 'block' : 'none';
    document.getElementById('tab-list').style.display  = tab === 'list'  ? 'block' : 'none';
    document.getElementById('tab-btn-input').className = 'tab-btn' + (tab === 'input' ? ' active' : '');
    document.getElementById('tab-btn-list').className  = 'tab-btn' + (tab === 'list'  ? ' active' : '');
    if (tab === 'list') renderList();
  };

  // ===== ログインボタン処理 =====
  document.getElementById('login-btn').addEventListener('click', function() {
    var pw = document.getElementById('login-pw').value.trim();
    var errEl = document.getElementById('login-error');
    if (!pw) {
      errEl.textContent = 'パスワードを入力してください';
      errEl.style.display = 'block';
      return;
    }
    if (login(pw)) {
      errEl.style.display = 'none';
      hideLoginScreen();
      initApp();
    } else {
      errEl.textContent = 'パスワードが違います。もう一度入力してください';
      errEl.style.display = 'block';
      document.getElementById('login-pw').value = '';
      document.getElementById('login-pw').focus();
    }
  });

  document.getElementById('login-pw').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('login-btn').click();
  });

  // ===== 起動 =====
  if (checkAuth()) {
    hideLoginScreen();
    initApp();
  } else {
    showLoginScreen();
  }

</script>
</body>
</html>
